<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Image Generator — Task 02</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #e0e0e0;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px;
      max-width: 680px;
      width: 100%;
      backdrop-filter: blur(12px);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      margin-bottom: 8px;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 15px;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #7b5ef7; }
    textarea::placeholder { color: rgba(255,255,255,0.3); }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 24px;
    }

    .chip {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      background: rgba(123, 94, 247, 0.2);
      border: 1px solid rgba(123, 94, 247, 0.4);
      color: #c4b5fd;
      cursor: pointer;
      transition: background 0.2s;
    }
    .chip:hover { background: rgba(123, 94, 247, 0.4); }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #7b5ef7, #5e3ec8);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #result { margin-top: 32px; }

    .spinner {
      display: none;
      text-align: center;
      padding: 24px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }
    .spinner.active { display: block; }

    .dot-bounce span {
      display: inline-block;
      width: 8px; height: 8px;
      background: #7b5ef7;
      border-radius: 50%;
      margin: 0 3px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot-bounce span:nth-child(2) { animation-delay: 0.2s; }
    .dot-bounce span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

    #generated-image {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      display: none;
    }
    #generated-image.visible { display: block; }

    .error-box {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.4);
      border-radius: 10px;
      padding: 14px 16px;
      color: #fca5a5;
      font-size: 14px;
      display: none;
    }
    .error-box.visible { display: block; }

    .filename-tag {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 10px;
      display: none;
    }
    .filename-tag.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎨 AI Image Generator</h1>
    <p class="subtitle">Task-02 · Prodigy Infotech · Stable Diffusion via Hugging Face</p>

    <label for="prompt">Enter your text prompt</label>
    <textarea id="prompt" placeholder="e.g. A futuristic city at night with glowing neon lights, photorealistic..."></textarea>

    <div class="examples">
      <span class="chip" onclick="setPrompt('A sunset over a calm ocean, oil painting style')">🌅 Sunset Ocean</span>
      <span class="chip" onclick="setPrompt('A dragon flying over mountains, fantasy art, detailed')">🐉 Dragon</span>
      <span class="chip" onclick="setPrompt('A cozy coffee shop in Paris, warm lighting, watercolor')">☕ Coffee Shop</span>
      <span class="chip" onclick="setPrompt('An astronaut walking on Mars, realistic, 4K')">🚀 Astronaut</span>
    </div>

    <button id="generate-btn" onclick="generateImage()">✨ Generate Image</button>

    <div id="result">
      <div class="spinner" id="spinner">
        <div class="dot-bounce"><span></span><span></span><span></span></div>
        <p style="margin-top:12px">Generating your image... this may take 15–30 seconds</p>
      </div>
      <div class="error-box" id="error-box"></div>
      <img id="generated-image" alt="AI Generated Image" />
      <p class="filename-tag" id="filename-tag"></p>
    </div>
  </div>

  <script>
    function setPrompt(text) {
      document.getElementById('prompt').value = text;
    }

    async function generateImage() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) { alert('Please enter a prompt!'); return; }

      const btn = document.getElementById('generate-btn');
      const spinner = document.getElementById('spinner');
      const imgEl = document.getElementById('generated-image');
      const errorBox = document.getElementById('error-box');
      const filenameTag = document.getElementById('filename-tag');

      btn.disabled = true;
      spinner.classList.add('active');
      imgEl.classList.remove('visible');
      errorBox.classList.remove('visible');
      filenameTag.classList.remove('visible');

      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();

        if (data.success) {
          imgEl.src = `data:image/png;base64,${data.image}`;
          imgEl.classList.add('visible');
          filenameTag.textContent = `Saved as: generated_images/${data.filename}`;
          filenameTag.classList.add('visible');
        } else {
          errorBox.textContent = data.error;
          errorBox.classList.add('visible');
        }
      } catch (err) {
        errorBox.textContent = 'Something went wrong. Is the Flask server running?';
        errorBox.classList.add('visible');
      } finally {
        btn.disabled = false;
        spinner.classList.remove('active');
      }
    }
  </script>
</body>
</html>
